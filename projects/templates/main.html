{% extends "master.html" %}

{% block title %}
    Listes des projets
{% endblock %}

{% block content %}
<style>
    .card {
        box-shadow: 0 16px 48px #E3E7EB;
    }
</style>
<div class="container">
    <div class="row">
        <div class="col-md-12 mt-3 left">
            {% for p in myprojects %}
                <div class="card mb-4">
                    <div class="card-body">
                        <h5 class="card-title">{{ p.desc }}</h2>
                        <p class="card-text text-muted h6">{{ article.author }} | {{ article.created_on}} </p>
                        <p class="card-text">{{article.content|slice:":200" }}</p>
                        <a class="btn btn-primary">En savoir plus &rarr;</a>
                    </div>
                </div>
            {% endfor %}
        </div>
    </div>
</div>
{% endblock %}
